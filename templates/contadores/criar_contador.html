<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/contadores/criar_contador.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="titulo-cabecalho">
          <h1>Criar Contador</h1>
        </div>
      </header>

    <main>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
              <a class="navbar-brand" href="#">Menu</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('contratos') }}">Contratos</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('produtos') }}">Produtos</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('impressoras') }}">Impressoras</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('secretarias') }}">Secretarias</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('contadores') }}">Contadores</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('faturamento') }}">Faturamento</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
        <div id="formulario">
            <Form method="post" class="form-group">
                <label for="">ID Impressora:</label>
                <Select name="id_impressoras" class="form-select">
                  {% for impressora in impressoras %}
                    <option value="{{ impressora[0] }}">{{ impressora[0] }}</option>
                  {% endfor %}
                </Select>
                <label for="">ID Setor:</label>
                <Select name="id_setores" class="form-select">
                  {% for setor in setores %}
                    <option value="{{ setor[0] }}">{{ setor[1] }}</option>
                  {% endfor %}
                </Select>
                <label for="">ID Produto:</label>
                <Select name="id_produtos" class="form-select">
                  {% for produto in produtos %}
                    <option value="{{ produto[0] }}">{{ produto[1] }}</option>
                  {% endfor %}
                </Select>
                <label for="">Data Coleta:</label>
                <input class="form-control" id="formGroupExampleInput" type="date" placeholder="Data Coleta" name="data_coleta" required>
                <label for="">Páginas Impressas:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Páginas Impressas" name="paginas_impressas" required>
                <label for="">Mês Referente:</label>
                <select name="mes_referente" class="form-select" aria-label="Default select example" required>
                    <option value="JANEIRO">JANEIRO</option>
                    <option value="FEVEREIRO">FEVEREIRO</option>
                    <option value="MARÇO">MARÇO</option>
                    <option value="ABRIL">ABRIL</option>
                    <option value="MAIO">MAIO</option>
                    <option value="JUNHO">JUNHO</option>
                    <option value="JULHO">JULHO</option>
                    <option value="AGOSTO">AGOSTO</option>
                    <option value="SETEMBRO">SETEMBRO</OU>
                    <option value="OUTUBRO">OUTUBRO</option>
                    <option value="NOVEMBRO">NOVEMBRO</option>
                    <option value="DEZEMBRO">DEZEMBRO</option>
                </select>
                <label for="">Proporção Mês:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" min="0" step="0.001" placeholder="Proporção Mês" name="proporcao_mes" required>
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
            </Form>
        </div>

        <div id="mensagem">{{ mensagem }}</div>
        <div class="container-botao">
            <div class="d-grid gap-4 col-3 mx-auto">
              <a class="btn btn-primary " href=" {{ url_for('contadores') }}" role="button">Voltar</a>
            </div>
        </div>
    </main>
    <footer class="bg-primary text-white text-center py-3">
        <p>&copy; 2024 Gestão Impressoras. Desenvolvido por Filipe Hoffmann e Bruno Monteiro.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
