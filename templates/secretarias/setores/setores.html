<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/secretarias/secretarias.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Setores</h1>
      </div>
    </header>

    <main>
      <div id="botao-novo-setor">
        <div class="d-grid gap-4 col-3 mx-auto">
          <a class="btn btn-primary " href="{{ url_for('criar_setor') }}" role="button">Novo setor</a>
        </div>
      </div>

      <div class="tabela">
        <div id="filtros">
          <div class="input-group mb-3">
            <select class="custom-select" id="inputGroupSelect02">
              <option selected>ID</option>
              {% for id in ids %}
                <option value="{{ id[0] }}">{{ id[0] }}</option>
              {% endfor %}
            </select>
            <a class="btn btn-primary" href="" role="button">Filtrar</a>
          </div>
        </div>

        <table class="table table-striped">
          <thead class="thead-dark">
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Nome Secretaria</th>
                <th scope="col">Nome Setor</th>
                <th scope="col">Endereço</th>
                <th scope="col">Editar</th>
                <th scope="col">Excluir</th>
              </tr>
          </thead>
          <tbody>
            {% for setor in setores %}
            <tr>
              <th scope="row">{{ setor[0] }}</td>
              <td>{{ setor[1] }}</td>
              <td>{{ setor[2] }}</td>
              <td>{{ setor[3] }}</td>
              <td><a class="btn btn-warning" href="{{ url_for('editar_setor', id_setor = setor[0]) }}" role="button">Editar</a></td>
              <td><a class="btn btn-danger" href="{{ url_for('excluir_setor', id_setor = setor[0]) }}" role="button">Excluir</a></td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <div class="container-botao">
        <div class="d-grid gap-4 col-3 mx-auto">
          <a class="btn btn-primary" href="{{ url_for('secretarias') }}" role="button">Voltar</a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
