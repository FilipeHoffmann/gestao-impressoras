<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/secretarias/editar_secretaria.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Setores</h1>
      </div>
    </header>
    <main>
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
          <a class="navbar-brand" href="{{ url_for('index') }}">Menu</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('contratos') }}">Contratos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('produtos') }}">Produtos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('impressoras') }}">Impressoras</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('secretarias') }}">Secretarias</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('contadores') }}">Contadores</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('faturamento') }}">Faturamento</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <div id="formulario">
        <form method="POST" class="form-group">
          <label for="id_secretaria">ID Secretaria:</label>
          <input class="form-control" type="text" id="id_secretaria" name="id_secretaria" class="form-control" value="{{ setor['id_secretaria'] }}" required>
          
          <label for="nome_setor">Nome do Setor:</label>
          <input class="form-control" type="text" id="nome_setor" name="nome_setor" class="form-control" value="{{ setor['nome_setor'] }}" required>
          
          <label for="endereco">Endereço:</label>
          <input class="form-control" type="text" id="endereco" name="endereco" class="form-control" value="{{ setor['endereco'] }}" required>
          
          <div class="form-group button-container">
            <button type="submit" class="btn btn-primary mb-3">Enviar</button>
          </div>
          </form>
      </div>
      <div class="d-grid gap-4 col-3 mx-auto">
        <a class="btn btn-primary" href="{{ url_for('setores') }}" role="button">Voltar</a>
      </div>
    </main>

    <footer class="bg-primary text-white text-center py-3">
      <p>&copy; 2024 Gestão Impressoras. Desenvolvido por Filipe Hoffmann e Bruno Monteiro.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
