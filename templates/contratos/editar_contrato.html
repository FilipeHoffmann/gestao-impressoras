<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/contratos/editar_contratos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Contratos</h1>
      </div>
    </header>
    <main>
        <div id="formulario">
            <form method="POST" class="form-group">
                <label for="descricao">Descrição:</label>
                <input type="text" id="descricao" name="descricao" value="{{ contrato.descricao }}" required><br>
        
                <label for="data_inicio">Data Início:</label>
                <input type="date" id="data_inicio" name="data_inicio" value="{{ contrato.data_inicio }}" required><br>
        
                <label for="data_fim">Data Fim:</label>
                <input type="date" id="data_fim" name="data_fim" value="{{ contrato.data_fim }}" required><br>
        
                <label for="contratada">Contratada:</label>
                <input type="text" id="contratada" name="contratada" value="{{ contrato.contratada }}" required><br>
        
                <label for="custo_total">Custo Total:</label>
                <input type="text" id="custo_total" name="custo_total" value="{{ contrato.custo_total }}" required><br>
        
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
                <div id="mensagem">{{mensagem}}</div>
            </form>
        </div>
          <div class="d-grid gap-4 col-3 mx-auto">
            <a class="btn btn-primary" href="{{ url_for('contratos') }}" role="button">Voltar</a>
          </div>
    </main>
    <footer>
        <div id="info-rodape">
        <p>Desenvolvido por Filipe Hoffmann, Bruno Monteiro e Ricardo Schutz</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
