<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/secretarias/editar_secretaria.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Setores</h1>
      </div>
    </header>
    <main>
      <div id="formulario">
        <form method="POST" class="form-group">
          <label for="id_secretaria">ID Secretaria:</label>
          <input type="text" id="id_secretaria" name="id_secretaria" class="form-control" value="{{ setor['id_secretaria'] }}" required>
          
          <label for="nome_setor">Nome do Setor:</label>
          <input type="text" id="nome_setor" name="nome_setor" class="form-control" value="{{ setor['nome_setor'] }}" required>
          
          <label for="endereco">Endereço:</label>
          <input type="text" id="endereco" name="endereco" class="form-control" value="{{ setor['endereco'] }}" required>
          
          <div class="form-group button-container">
            <button type="submit" class="btn btn-primary mb-3">Enviar</button>
          </div>
          </form>
      </div>
      <div class="d-grid gap-4 col-3 mx-auto">
        <a class="btn btn-primary" href="{{ url_for('setores') }}" role="button">Voltar</a>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
