<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/produtos/criar_produto.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="titulo-cabecalho">
          <h1>Criar Produto</h1>
        </div>
      </header>

    <main>
        <div id="formulario">
            <Form method="post" class="form-group">
                <label for="">Lote:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Lote" name="lote" required>
                <label for="">Código:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Código" name="codigo" required>
                <label for="">Descrição:</label>
                <input class="form-control" id="formGroupExampleInput" type="text" placeholder="Descrição" name="descricao" required>
                <label for="">Unidade:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Unidade" name="unidade" required>
                <label for="">Quantidade Mensal:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Quantidade Mensal" name="quantidade_mensal" required>
                <label for="">Quantidade Anual:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Quantidade Anual" name="quantidade_anual" required>
                <label for="">Valor Unitário:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Valor Unitário" name="valor_unitario" required>
                <label for="">Valor Total:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Valor Total" name="valor_total" required>
                <label for="">ID Contrato:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="ID Contrato" name="id_contratos">
                <label for="">ID Aditivo:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="ID Aditivo" name="id_aditivos">
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
            </Form>
        </div>

        <div id="mensagem">{{ mensagem }}</div>
        <div class="container-botao">
            <div class="d-grid gap-4 col-3 mx-auto">
              <a class="btn btn-primary " href=" {{ url_for('produtos') }}" role="button">Voltar</a>
            </div>
        </div>
    </main>

    <footer>
        <div id="info-rodape">
          <p>Desenvolvido por Filipe Hoffmann, Bruno Monteiro e Ricardo Schutz</p>
        </div>
    </footer>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
