<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/contratos/criar_contrato.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="titulo-cabecalho">
          <h1>Criar Contrato</h1>
        </div>
      </header>

    <main>
        <div id="formulario">
            <Form method="post" class="form-group">
                <label for="">Descrição:</label>
                <input class="form-control" id="formGroupExampleInput" type="text" placeholder="Descrição" name="descricao" required>
                <label for="">Data início:</label>
                <input class="form-control" id="formGroupExampleInput" type="date" placeholder="Data Início" name="data_inicio" required>
                <label for="">Data fim:</label>
                <input class="form-control" id="formGroupExampleInput" type="date" placeholder="Data Fim" name="data_fim" required>
                <label for="">Contratada:</label>
                <input class="form-control" id="formGroupExampleInput" type="text" placeholder="Contratada" name="contratada" required>
                <label for="">Custo total:</label>
                <input class="form-control" id="formGroupExampleInput" type="text" placeholder="Custo total" name="custo_total" required>
                
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
            </Form>
        </div>

        <div id="mensagem">{{ mensagem }}</div>
        <div class="container-botao">
            <div class="d-grid gap-4 col-3 mx-auto">
              <a class="btn btn-primary " href=" {{ url_for('contratos') }}" role="button">Voltar</a>
            </div>
        </div>
    </main>

    <footer>
        <div id="info-rodape">
          <p>Desenvolvido por Filipe Hoffmann, Bruno Monteiro e Ricardo Schutz</p>
        </div>
    </footer>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
