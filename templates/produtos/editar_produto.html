<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/produtos/editar_produto.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Produto</h1>
      </div>
    </header>
    <main>
        <div id="formulario">
            <form method="POST" class="form-group">
                <label for="lote">Lote:</label>
                <input type="number" id="lote" name="lote" value="{{ produto.lote }}" required><br>
        
                <label for="codigo">Código:</label>
                <input type="number" id="codigo" name="codigo" value="{{ produto.codigo }}" required><br>
        
                <label for="descricao">Descrição:</label>
                <input type="text" id="descricao" name="descricao" value="{{ produto.descricao }}" required><br>
        
                <label for="unidade">Unidade:</label>
                <input type="number" id="unidade" name="unidade" value="{{ produto.unidade }}" required><br>
        
                <label for="quantidade_mensal">Quantidade Mensal:</label>
                <input type="number" id="quantidade_mensal" name="quantidade_mensal" value="{{ produto.quantidade_mensal }}" required><br>

                <label for="quantidade_anual">Quantidade Anual:</label>
                <input type="number" id="quantidade_anual" name="quantidade_anual" value="{{ produto.quantidade_anual }}" required><br>

                <label for="valor_unitario">Valor Unitário:</label>
                <input type="number" id="valor_unitario" name="valor_unitario" value="{{ produto.valor_unitario }}" required><br>

                <label for="valor_total">Valor Total:</label>
                <input type="number" id="valor_total" name="valor_total" value="{{ produto.valor_total }}" required><br>

                <label for="id_contratos">ID Contrato:</label>
                <input type="number" id="id_contratos" name="id_contratos" value="{{ produto.id_contratos }}" required><br>

                <label for="id_aditivos">ID Aditivo:</label>
                <input type="number" id="id_aditivos" name="id_aditivos" value="{{ produto.id_aditivos }}" required><br>
        
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
            </form>
        </div>
          <div class="d-grid gap-4 col-3 mx-auto">
            <a class="btn btn-primary" href="{{ url_for('produtos') }}" role="button">Voltar</a>
          </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
