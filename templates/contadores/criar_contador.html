<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/contadores/criar_contador.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="titulo-cabecalho">
          <h1>Criar Contador</h1>
        </div>
      </header>

    <main>
        <div id="formulario">
            <Form method="post" class="form-group">
                <label for="">ID Impressora:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="ID Impressoras" name="id_impressoras" required>
                <label for="">ID Setor:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="ID Setor" name="id_setores" required>
                <label for="">ID Produto:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="ID Produto" name="id_produtos" required>
                <label for="">Data Coleta:</label>
                <input class="form-control" id="formGroupExampleInput" type="date" placeholder="Data Coleta" name="data_coleta" required>
                <label for="">Páginas Impressas:</label>
                <input class="form-control" id="formGroupExampleInput" type="number" placeholder="Páginas Impressas" name="paginas_impressas" required>
                <label for="">Mês Referente:</label>
                <select name="mes_referente" class="form-select" aria-label="Default select example" required>
                    <option value="JANEIRO">JANEIRO</option>
                    <option value="FEVEREIRO">FEVEREIRO</option>
                    <option value="MARÇO">MARÇO</option>
                    <option value="ABRIL">ABRIL</option>
                    <option value="MAIO">MAIO</option>
                    <option value="JUNHO">JUNHO</option>
                    <option value="JULHO">JULHO</option>
                    <option value="AGOSTO">AGOSTO</option>
                    <option value="SETEMBRO">SETEMBRO</OU>
                    <option value="OUTUBRO">OUTUBRO</option>
                    <option value="NOVEMBRO">NOVEMBRO</option>
                    <option value="DEZEMBRO">DEZEMBRO</option>
                </select>
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
            </Form>
        </div>

        <div id="mensagem">{{ mensagem }}</div>
        <div class="container-botao">
            <div class="d-grid gap-4 col-3 mx-auto">
              <a class="btn btn-primary " href=" {{ url_for('contadores') }}" role="button">Voltar</a>
            </div>
        </div>
    </main>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</body>
</html>
