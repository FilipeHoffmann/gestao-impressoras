<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/impressoras/editar_impressoras.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Impressoras</h1>
      </div>
    </header>
    <main>
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
          <a class="navbar-brand" href="{{ url_for('index') }}">Menu</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('contratos') }}">Contratos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('produtos') }}">Produtos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('impressoras') }}">Impressoras</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('secretarias') }}">Secretarias</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('contadores') }}">Contadores</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('faturamento') }}">Faturamento</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <br>
        <div id="formulario">
            <form method="POST" class="form-group">
                <label for="modelo">Modelo:</label>
                <input class="form-control" type="text" id="modelo" name="modelo" value="{{ impressora.modelo }}" required>
        
                <label for="marca">Marca:</label>
                <input class="form-control" type="text" id="marca" name="marca" value="{{ impressora.marca }}" required>

                <label for="marca">IP:</label>
                <input class="form-control" type="text" id="ip" name="ip" value="{{ impressora.ip }}" required>
        
                <label for="localizacao">Localização:</label>
                <input class="form-control" type="text" id="localizacao" name="localizacao" value="{{ impressora.localizacao }}" required>
        
                <label for="status">Status:</label>
                <select name="status" class="form-select" required>
                  <option value="ATIVA">ATIVA</option>
                  <option value="TROCADA">TROCADA</option>
                  <option value="DESATIVADA">DESATIVADA</option>
                </select>
        
                <label for="tipo_impressora">Tipo Impressora:</label>
                <input class="form-control" type="text" id="tipo_impressora" name="tipo_impressora" value="{{ impressora.tipo_impressora }}" required>

                <label for="id_cotas">Cotas:</label>
                <input class="form-control" type="text" id="cotas" name="cotas" value="{{ impressora.cotas }}" >

                <label for="">Contador Inicial:</label>
                <input class="form-control" type="number" id="contador_inicial" name="contador_inicial" value="{{ impressora.contador_inicial }}">

                <label for="id_setores">ID Setores:</label>
                <input class="form-control" type="text" id="id_setores" name="id_setores" value="{{ impressora.id_setores }}" >
        
                <div class="form-group button-container">
                    <button type="submit" class="btn btn-primary mb-3">Enviar</button>
                </div>
            </form>
        </div>
        <br>
          <div class="d-grid gap-4 col-3 mx-auto">
            <a class="btn btn-primary" href="{{ url_for('impressoras') }}" role="button">Voltar</a>
          </div>
        <br>
    </main>

    <footer class="bg-primary text-white text-center py-3">
      <p>&copy; 2024 Gestão Impressoras. Desenvolvido por Filipe Hoffmann e Bruno Monteiro.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
