<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/contadores/editar_contador.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Contador</h1>
      </div>
    </header>
    <main>
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
          <a class="navbar-brand" href="#">Menu</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('contratos') }}">Contratos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('produtos') }}">Produtos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('impressoras') }}">Impressoras</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('secretarias') }}">Secretarias</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('contadores') }}">Contadores</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('faturamento') }}">Faturamento</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <div id="formulario">
          <form method="POST" class="form-group">
              <label for="lote">ID Impressoras:</label>
              <input type="text" id="id_impressoras" name="id_impressoras" value="{{ contador.id_impressoras }}" required><br>
              <label for="lote">ID Setores:</label>
              <input type="text" id="id_setores" name="id_setores" value="{{ contador.id_setores }}" required><br>
              <label for="lote">ID Produtos:</label>
              <input type="text" id="id_produtos" name="id_produtos" value="{{ contador.id_produtos }}" required><br>
              <label for="lote">Data Coleta:</label>
              <input type="text" id="data_coleta" name="data_coleta" value="{{ contador.data_coleta }}" required><br>
              <label for="lote">Paginas Impressas:</label>
              <input type="text" id="paginas_impressas" name="paginas_impressas" value="{{ contador.paginas_impressas }}" required><br>
              <label for="lote">Mês Referente:</label>
              <input type="text" id="mes_referente" name="mes_referente" value="{{ contador.mes_referente }}" required><br>

              <div class="form-group button-container">
                  <button type="submit" class="btn btn-primary mb-3">Enviar</button>
              </div>
          </form>
      </div>
          <div class="d-grid gap-4 col-3 mx-auto">
            <a class="btn btn-primary" href="{{ url_for('contadores') }}" role="button">Voltar</a>
          </div>
    </main>
    <footer class="bg-primary text-white text-center py-3">
      <p>&copy; 2024 Gestão Impressoras. Desenvolvido por Filipe Hoffmann e Bruno Monteiro.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
