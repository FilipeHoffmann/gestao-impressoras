<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/contratos/editar_contratos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Editar Aditivo</h1>
      </div>
    </header>
    <main>
      <div id="formulario">
          <form method="POST" class="form-group">
              <label for="id_contrato">ID do Contrato:</label>
              <input type="text" id="id_contrato" name="id_contrato" value="{{ aditivo.id_contrato }}" required><br>

              <label for="data_prorrogada">Data Prorrogada:</label>
              <input type="date" id="data_prorrogada" name="data_prorrogada" value="{{ aditivo.data_prorrogada }}" required><br>

              <label for="detalhes">Detalhes:</label>
              <input type="text" id="detalhes" name="detalhes" value="{{ aditivo.detalhes }}" required><br>

              <label for="custo_adicional">Custo Adicional:</label>
              <input type="text" id="custo_adicional" name="custo_adicional" value="{{ aditivo.custo_adicional }}" required><br>

              <div class="form-group button-container">
                  <button type="submit" class="btn btn-primary mb-3">Enviar</button>
              </div>
              {% if mensagem %}
                  <div id="mensagem">{{ mensagem }}</div>
              {% endif %}
          </form>
      </div>
          <div class="d-grid gap-4 col-3 mx-auto">
            <a class="btn btn-primary" href="{{ url_for('aditivos') }}" role="button">Voltar</a>
          </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>
</html>
