<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestão Impressoras</title>
    <link rel="stylesheet" href="/static/styles/faturamento/faturamento.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <header>
      <div class="titulo-cabecalho">
        <h1>Faturamento</h1>
      </div>
    </header>

    <main>
      <div id="container-faturamento">
        <div id="container-meses">
          <p>MESES</p>
          <ul id="lista-meses">
            <li>JANEIRO</li>
            <li>FEVEREIRO</li>
            <li>MARÇO</li>
            <li>ABRIL</li>
            <li>MAIO</li>
            <li>JUNHO</li>
            <li>JULHO</li>
            <li>AGOSTO</li>
            <li>SETEMBRO</li>
            <li>OUTUBRO</li>
            <li>NOVEMBRO</li>
            <li>DEZEMBRO</li>
          </ul>
        </div>
        <div id="container-calculo">
          <p>ITENS</p>
          <table class="table table-striped">
            <thead class="thead-dark">
              <tr>
                <th>CONTADOR</th>
                <th>SECRETARIA</th>
                <th>SETOR</th>
                <th>PÁGINAS IMPRESSAS</th>
                <th>COTA</th>
                <th>EXCEDENTES</th>
                <th>TOTAL A PAGAR</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td>R$ </td>
              </tr>
            </tbody>
          </table>
          <div id="container-total">
            <p>CUSTO TOTAL: </p>
          </div>
        </div>

      </div>
      
      <div class="container-botao">
        <div class="d-grid gap-4 col-3 mx-auto">
          <a class="btn btn-primary" href="{{ url_for('index') }}" role="button">Voltar</a>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
  </body>
</html>
